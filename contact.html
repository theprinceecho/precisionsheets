<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Contact • PrecisionSheets</title>
    <meta name="description" content="Get in touch with PrecisionSheets. Questions about Excel templates, FP&A dashboards, or custom solutions? We reply within 24 hours.">
    <link rel="canonical" href="https://precisionsheets.info/contact" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/theprinceecho/precisionsheets/main/PS_Logo_new.jpg">
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0a1628;
            color: #d4af77;
            min-height: 100vh;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        .nav-logo { height: 32px; cursor: pointer; border-radius: 8px; overflow: hidden; border: 2px solid rgba(212,175,119,0.4); }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 0.95rem;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }
        .language-switcher {
            position: relative;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .current-lang {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
        }
        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: #111111;
            border: 1px solid rgba(212,175,119,0.3);
            border-radius: 8px;
            padding: 8px 0;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            min-width: 140px;
        }
        .language-dropdown.show { display: flex; }
        .language-option {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #d4af77;
            text-decoration: none;
        }
        .language-option:hover, .language-option:active {
            background: rgba(212,175,119,0.15);
        }
        .main-content {
            padding-top: 120px;
            padding-bottom: 120px;
            max-width: 1080px;
            margin: 0 auto;
            text-align: center;
        }
       
        h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
            color: #d4af77;
        }
       
        .form-container {
            padding: 0 40px;
            max-width: 920px;
            margin: 0 auto;
        }
        @media (max-width: 1080px) {
            .main-content { max-width: 920px; }
            .form-container { padding: 0 32px; }
        }
        @media (max-width: 480px) {
            .nav { padding: 0 20px; }
            .nav-links { gap: 18px; }
            .main-content {
                padding-top: 140px;
                padding-bottom: 160px;
            }
            h1 { font-size: 2.55rem; margin-bottom: 22px; }
            .main-content p { margin-bottom: 48px; font-size: 1.17rem; }
            .form-container { padding: 0 20px; margin-bottom: 32px; }
            iframe { width: 100% !important; max-width: 100% !important; }
        }
        .footer {
            margin-top: 0;
            padding-top: 60px;
            padding-bottom: 70px;
            text-align: center;
            font-size: 0.9rem;
            color: #ffffff;
            opacity: 0.85;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            line-height: 1.8;
            background: #11253a;
        }
        .footer a { color: #ffffff !important; text-decoration: none; }
        .footer-line1 { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .copyright { font-size: 0.85rem; opacity: 0.7; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html">
            <img src="https://raw.githubusercontent.com/theprinceecho/precisionsheets/main/PS_Logo_new.jpg" alt="PrecisionSheets" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#products">Products & Services</a>
           
            <div class="language-switcher" id="language-switcher">
                <span class="current-lang" id="current-lang-display">US <strong>US</strong></span>
                <div class="language-dropdown" id="language-dropdown">
                    <a href="#" class="language-option" data-lang="en">US US</a>
                    <a href="#" class="language-option" data-lang="de">DE DE</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h1>Contact</h1>
        <p style="font-size: 1.2rem; opacity: 0.92; max-width: 420px; margin: 0 auto 60px; line-height: 1.5; color: #ffffff;">
            A direct line for those who value precision.
        </p>
       
        <div class="form-container">
            <iframe src="https://tally.so/embed/GxY5lj?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
                    width="100%"
                    height="1600"
                    frameborder="0"
                    scrolling="no"
                    style="border: none; background: transparent; display: block;">
            </iframe>
        </div>
    </div>

    <div class="footer">
        <div class="footer-line1">
            <span>High-precision tools for serious finance teams</span>
        </div>
        <div>
            <a href="legal.html">Legal disclosure</a>
            <span style="margin:0 12px;opacity:0.6">•</span>
            <a href="contact.html">Contact</a>
        </div>
        <div class="copyright">Copyright © 2026 PrecisionSheets • All rights reserved.</div>
    </div>
</body>
</html>
