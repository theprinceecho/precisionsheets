<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionSheets</title>
    <meta name="description" content="Professional Excel templates & dashboards for FP&A professionals.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a2540;
            color: #ffffff;
            min-height: 100vh;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 37, 64, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }
        .nav-logo {
            height: 42px;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 1.05rem;
        }
        .nav-links a {
            color: #d4af77;
            text-decoration: none;
            font-weight: 500;
        }
        .nav-links a:hover {
            color: #ffffff;
        }
        .main-content {
            padding-top: 120px;
            text-align: center;
        }
        .logo {
            width: 260px;
            height: 260px;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 0 70px rgba(212, 175, 119, 0.6);
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 420px;
            margin: 0 auto 50px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(212, 175, 119, 0.1);
            color: #d4af77;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            margin: 12px;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 119, 0.3);
        }
        .button:hover {
            background: rgba(212, 175, 119, 0.2);
            transform: translateY(-3px);
        }
        .footer {
            margin-top: 100px;
            font-size: 0.95rem;
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <nav>
        <img src="https://raw.githubusercontent.com/theprinceecho/precisionsheets/main/PS_Logo.jpg" alt="PrecisionSheets" class="nav-logo">
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
        </div>
    </nav>

    <div class="main-content" id="home">
        <img src="https://raw.githubusercontent.com/theprinceecho/precisionsheets/main/PS_Logo.jpg" alt="PrecisionSheets" class="logo">

        <h1>PrecisionSheets</h1>
        <p class="subtitle">Professional Excel templates &amp; dashboards for FP&amp;A professionals</p>

        <a href="https://precisionsheets.gumroad.com" target="_blank" class="button">
            Browse Templates
        </a>
        <a href="https://x.com/precisionsheets" target="_blank" class="button">
            Follow on X
        </a>
    </div>

    <div class="footer">
        High-precision tools for serious finance teams
    </div>
</body>
</html>
