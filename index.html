<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionSheets</title>
    <meta name="description" content="Professional Excel templates & dashboards for FP&A professionals.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a2540;
            color: #d4af77;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo {
            width: 220px;
            height: 220px;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(212, 175, 119, 0.5);
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 12px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 420px;
            margin: 0 auto 50px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(212, 175, 119, 0.1);
            color: #d4af77;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            margin: 12px;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 119, 0.3);
        }
        .button:hover {
            background: rgba(212, 175, 119, 0.2);
            transform: translateY(-3px);
        }
        .footer {
            margin-top: 80px;
            font-size: 0.95rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/theprinceecho/precisionsheets/main/PS_Logo.jpg" alt="PrecisionSheets" class="logo">

    <h1>PrecisionSheets</h1>
    <p class="subtitle">Professional Excel templates &amp; dashboards for FP&amp;A professionals</p>

    <a href="https://precisionsheets.gumroad.com" target="_blank" class="button">
        Browse Templates
    </a>
    <a href="https://x.com/precisionsheets" target="_blank" class="button">
        Follow on X
    </a>

    <div class="footer">
        High-precision tools for serious finance teams
    </div>
</body>
</html>
